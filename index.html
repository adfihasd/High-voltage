<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
  <title>高电压期末复习</title>
  <style>
    /* ===== CSS 变量 ===== */
    :root {
      --bg-page: #faf8f2;
      --bg-card: #fffef9;
      --text-primary: #2c2416;
      --text-secondary: #5c5347;
      --accent: #8b4513;
      --accent-light: #d4a76a;
      --border: #e0d8c8;
      --tag-bg: #f0ebe0;
      --max-width: 720px;
      --radius: 8px;
      --font-serif: "Noto Serif SC", "Source Han Serif SC", "Songti SC", Georgia, "Times New Roman", serif;
    }

    /* ===== 重置样式 ===== */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== Body ===== */
    body {
      font-family: var(--font-serif);
      background: var(--bg-page);
      color: var(--text-primary);
      line-height: 1.8;
      max-width: var(--max-width);
      margin: 0 auto;
      min-height: 100vh;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== 主容器 ===== */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ===== 章节导航栏 ===== */
    #chapter-nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg-page);
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }

    #chapter-tabs {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      scrollbar-width: none;
      -ms-overflow-style: none;
      user-select: none;
    }

    #chapter-tabs::-webkit-scrollbar {
      display: none;
    }

    #chapter-tabs .chapter-tab {
      flex-shrink: 0;
      padding: 6px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-secondary);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      user-select: none;
    }

    #chapter-tabs .chapter-tab:hover {
      background: var(--tag-bg);
      color: var(--text-primary);
    }

    #chapter-tabs .chapter-tab.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ===== 主内容区 ===== */
    #main-content {
      flex: 1;
      display: flex;
      align-items: stretch;
      position: relative;
    }

    /* ===== 箭头按钮 ===== */
    .nav-arrow {
      flex-shrink: 0;
      width: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 1.6rem;
      opacity: 0.5;
      transition: opacity 0.2s ease, background 0.2s ease;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .nav-arrow:hover {
      opacity: 0.85;
      background: rgba(0, 0, 0, 0.03);
    }

    .nav-arrow:active {
      opacity: 1;
    }

    /* ===== 卡片容器 ===== */
    #card-container {
      flex: 1;
      display: flex;
      align-items: stretch;
      overflow: hidden;
      position: relative;
    }

    #knowledge-card {
      flex: 1;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    #knowledge-card.swipe-left {
      transform: translateX(-60px);
      opacity: 0;
    }

    #knowledge-card.swipe-right {
      transform: translateX(60px);
      opacity: 0;
    }

    #knowledge-card.swipe-in {
      transform: translateX(0);
      opacity: 1;
    }

    /* ===== 内容滚动区 ===== */
    #card-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px 40px;
      -webkit-overflow-scrolling: touch;
    }

    /* ===== 标题 ===== */
    #kp-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.5;
      margin-bottom: 8px;
    }

    /* ===== 章节标记 ===== */
    #kp-badge {
      display: inline-block;
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--tag-bg);
      padding: 2px 12px;
      border-radius: var(--radius);
      margin-bottom: 16px;
      user-select: none;
    }

    /* ===== 正文 ===== */
    #kp-content {
      font-size: 0.95rem;
      color: var(--text-primary);
    }

    #kp-content p {
      margin-bottom: 10px;
    }

    #kp-content strong {
      color: var(--accent);
      font-weight: 700;
    }

    #kp-content ul,
    #kp-content ol {
      margin-left: 20px;
      margin-bottom: 10px;
    }

    #kp-content ul li,
    #kp-content ol li {
      margin-bottom: 4px;
    }

    /* ===== 分区标题 ===== */
    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text-primary);
      border-top: 1px solid var(--border);
      margin-top: 28px;
      padding-top: 16px;
      margin-bottom: 12px;
    }

    /* ===== 相关链接 ===== */
    #related-section {
      margin-top: 4px;
    }

    #related-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .related-item {
      display: block;
      padding: 12px 16px;
      background: var(--tag-bg);
      border-radius: var(--radius);
      text-decoration: none;
      color: var(--text-primary);
      transition: background 0.2s ease;
      cursor: pointer;
    }

    .related-item:hover {
      background: #e8e0d0;
    }

    .related-item .related-title {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .related-item .related-desc {
      font-size: 0.82rem;
      color: var(--text-secondary);
    }

    /* ===== 预测题目 ===== */
    #questions-section {
      margin-top: 4px;
    }

    #questions-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .question-block {
      margin-bottom: 18px;
      padding: 12px;
      background: #fdfcfa;
      border-left: 3px solid var(--accent-light);
      border-radius: 0 6px 6px 0;
    }

    .question-type-label {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .question-item {
      border-left: 3px solid var(--accent);
      background: var(--tag-bg);
      padding: 12px 16px;
      border-radius: 0 var(--radius) var(--radius) 0;
      margin-bottom: 8px;
      font-size: 0.9rem;
      line-height: 1.7;
    }

    .question-item .q-type {
      font-size: 0.78rem;
      color: var(--accent);
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .question-item .q-text {
      font-size: 0.9rem;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .question-item .q-num {
      font-weight: 600;
      color: var(--text-secondary);
      margin-right: 4px;
    }

    .question-item .options {
      padding-left: 20px;
      margin-top: 2px;
      color: var(--text-secondary);
      font-size: 0.88rem;
    }

    .question-item .answer-hint {
      font-size: 0.78rem;
      color: var(--accent);
      margin-top: 4px;
      font-style: normal;
      opacity: 0.85;
      border-left: 2px solid var(--accent-light);
      padding-left: 8px;
    }

    .question-item .q-options {
      font-size: 0.88rem;
      color: var(--text-secondary);
      margin-left: 8px;
    }

    .question-item .q-answer {
      font-size: 0.85rem;
      color: var(--accent);
      font-style: italic;
      margin-top: 8px;
    }

    /* ===== 弹窗 ===== */
    #boundary-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    #boundary-modal.modal-hidden {
      display: none;
    }

    .modal-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(44, 36, 22, 0.4);
    }

    .modal-dialog {
      position: relative;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(44, 36, 22, 0.15);
      padding: 28px 24px 20px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    #boundary-message {
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 20px;
      line-height: 1.6;
    }

    .modal-dialog .modal-buttons {
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    .modal-dialog .modal-btn {
      padding: 8px 28px;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
      border: 1px solid var(--border);
      font-family: var(--font-serif);
      transition: all 0.2s ease;
    }

    #boundary-yes {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    #boundary-yes:hover {
      opacity: 0.9;
    }

    #boundary-no {
      background: var(--bg-card);
      color: var(--text-secondary);
    }

    #boundary-no:hover {
      background: var(--tag-bg);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .nav-arrow {
        width: 32px;
        opacity: 0.35;
        font-size: 1.3rem;
      }

      #card-scroll {
        padding: 18px 14px 32px;
      }

      #kp-title {
        font-size: 1.25rem;
      }

      #chapter-nav {
        padding: 10px 12px;
      }

      #chapter-tabs .chapter-tab {
        padding: 5px 14px;
        font-size: 0.82rem;
      }

      .modal-dialog {
        padding: 22px 18px 16px;
        max-width: 300px;
      }
    }
  </style>
</head>
<body>
  <div id="app">

    <!-- 章节导航栏 -->
    <nav id="chapter-nav">
      <div id="chapter-tabs">
        <!-- 章节标签由 JS 动态生成 -->
      </div>
    </nav>

    <!-- 主内容区 -->
    <div id="main-content">
      <!-- 左箭头 -->
      <button class="nav-arrow" id="btn-prev" aria-label="上一知识点">&#8249;</button>

      <!-- 卡片容器 -->
      <div id="card-container">
        <div id="knowledge-card">
          <div id="card-scroll">

            <!-- 知识点标题 -->
            <div id="kp-title"></div>

            <!-- 章节标记 -->
            <div id="kp-badge"></div>

            <!-- 知识点正文 -->
            <div id="kp-content"></div>

            <!-- 相关知识链接区 -->
            <div id="related-section">
              <div class="section-title">相关知识</div>
              <div id="related-links"></div>
            </div>

            <!-- 预测题目区 -->
            <div id="questions-section">
              <div class="section-title">预测题目</div>
              <div id="questions-list"></div>
            </div>

          </div><!-- /#card-scroll -->
        </div><!-- /#knowledge-card -->
      </div><!-- /#card-container -->

      <!-- 右箭头 -->
      <button class="nav-arrow" id="btn-next" aria-label="下一知识点">&#8250;</button>
    </div><!-- /#main-content -->

    <!-- 章节边界确认弹窗 -->
    <div id="boundary-modal" class="modal-hidden">
      <div class="modal-overlay"></div>
      <div class="modal-dialog">
        <p id="boundary-message"></p>
        <div class="modal-buttons">
          <button class="modal-btn" id="boundary-yes">是</button>
          <button class="modal-btn" id="boundary-no">否</button>
        </div>
      </div>
    </div>

  </div><!-- /#app -->

  <script>
    // ===== 章节配置 =====
    const CHAPTERS = [
      { id: 1, title: '第一章', subtitle: '气体放电', score: 34, predictScore: 34 },
      { id: 2, title: '第二章', subtitle: '电介质极化与击穿', score: 8, predictScore: 8 },
      { id: 3, title: '第三章', subtitle: '固体电介质击穿', score: 3, predictScore: 3 },
      { id: 4, title: '第四章', subtitle: '绝缘预防性试验', score: 5, predictScore: 5 },
      { id: 5, title: '第五章', subtitle: '高电压试验', score: 5, predictScore: 5 },
      { id: 7, title: '第七章', subtitle: '行波理论', score: 16, predictScore: 6 },
      { id: 8, title: '第八章', subtitle: '防雷保护', score: 18, predictScore: 8 },
      { id: 9, title: '第九章', subtitle: '内部过电压与绝缘配合', score: 11, predictScore: 11 },
    ];
    const TOTAL_PREDICT_SCORE = CHAPTERS.reduce((sum, c) => sum + c.predictScore, 0);

    // ===== 知识点数据 =====
    const KNOWLEDGE_POINTS = [

      // ===== 第1章: 气体放电 (11个) =====
      {
        id: "1-1", chapterId: 1,
        title: "电介质分类与外内绝缘",
        content: `<p><strong>电介质按物质形态分类：</strong>气体介质、液体介质、固体介质。</p>
    <p><strong>电气设备的外绝缘：</strong>一般由气体介质和固体介质联合组成。</p>
    <p><strong>设备的内绝缘：</strong>由固体介质和液体介质联合组成。</p>
    <p>（外绝缘结构（空气+固体绝缘子）是典型的极不均匀电场，因此电晕放电和极性效应主要与外绝缘相关；内绝缘击穿后不可自恢复，因此采用三次冲击法而非多次。）</p>`,
        related: [
          { targetId: "1-8", title: "电晕放电与极性效应", desc: "电晕放电发生在极不均匀电场中，常见于外绝缘结构" },
          { targetId: "5-4", title: "绝缘试验方法", desc: "内绝缘采用三次冲击法，外绝缘采用十五次冲击法" },
        ],
        questions: []
      },

      {
        id: "1-2", chapterId: 1,
        title: "电离与热电离",
        content: `<p><strong>电离：</strong>指电子脱离原子核的束缚而形成自由电子和正离子的过程。电离是后续碰撞电离、光电离、热电离、分级电离的统一定义，也是电介质击穿和击穿理论的基础。</p>
    <p><strong>热电离：</strong></p>
    <p>定义：由气体的热状态而引起的电离。</p>
    <p>形式：先导放电、滑闪放电、污闪。（先导放电即先导通道。）</p>
    <p>（与第三章热击穿中的"热不稳定过程"思想类似，均由热引发，但热电离是气体中产生带电粒子，热击穿是固体介质失去绝缘性能。）</p>`,
        related: [
          { targetId: "1-9", title: "先导通道", desc: "先导放电是热电离的一种形式" },
          { targetId: "3-1", title: "热击穿", desc: "热击穿与热电离均由热引发，但机制和结果不同" },
        ],
        questions: []
      },

      {
        id: "1-3", chapterId: 1,
        title: "光电离与碰撞电离",
        content: `<p><strong>光电离：</strong></p>
    <p>定义：光辐射引起的气体分子的电离过程。（流注理论中的"空间光电离"即以此为基础。）</p>
    <p>条件①：hν ≥ Wi（光子能量 ≥ 逸出功），其中 h 为普朗克常量，c 为光速，λ 为光的波长（ν = c/λ），Wi 为逸出功。</p>
    <p>条件②：短波长的光（如各种射线、短波长紫外线）可引发光电离；可见光、红外线不可。</p>
    <p><strong>碰撞电离：</strong></p>
    <p>定义与条件：带电质点（带有动能 ½mv²）在电场作用下撞击气体原子，使其电离，产生正离子和自由电子。这是汤逊理论中α过程的核心机制，也是电子崩形成的基础。</p>
    <p>发生条件：带电质点的动能 > 气体原子的电离能。</p>`,
        related: [
          { targetId: "1-5", title: "α系数与自持放电条件", desc: "碰撞电离是α过程的核心" },
          { targetId: "1-6", title: "汤逊理论", desc: "汤逊α过程基于碰撞电离" },
          { targetId: "1-7", title: "流注理论", desc: "流注理论中的空间光电离基于光电离" },
        ],
        questions: []
      },

      {
        id: "1-4", chapterId: 1,
        title: "分级电离与气体中负离子的形成",
        content: `<p><strong>分级电离：</strong></p>
    <p>定义：原子或分子在激励态再获得能量而发生的电离。这是对碰撞电离的补充：当电子能量不足以一次电离时，可先激励再电离。</p>
    <p><strong>气体中负离子的形成：</strong></p>
    <p>SF₆气体含F，属于强电负性气体，具有灭弧能力。（第八章防雷中"防止雷击闪络后建立稳定的工频电弧"与此相关，SF₆常用于断路器等灭弧设备。）</p>`,
        related: [
          { targetId: "1-3", title: "光电离与碰撞电离", desc: "分级电离是碰撞电离的补充机制" },
          { targetId: "8-4", title: "四道防线与八大措施", desc: "第三道防线灭弧与SF₆灭弧目的相同" },
        ],
        questions: []
      },

      {
        id: "1-5", chapterId: 1,
        title: "α系数与自持放电条件",
        content: `<p><strong>电子碰撞电离系数 α：</strong>代表一个电子沿电场方向行经1cm时平均发生的碰撞电离次数。α是汤逊理论自持放电条件的核心参数。</p>
    <p><strong>自持放电条件：</strong>γ(e^(αd) − 1) = 1 或 γe^(αd) = 1。这是汤逊理论的结论。</p>
    <p>（流注理论的自持放电条件为 e^(αd) = 常数 或 αd = 常数，两者形式不同但本质都是描述放电能够自行维持的临界条件。）</p>`,
        related: [
          { targetId: "1-3", title: "光电离与碰撞电离", desc: "α系数基于碰撞电离定义" },
          { targetId: "1-6", title: "汤逊理论", desc: "自持放电条件是汤逊理论的核心结论" },
          { targetId: "1-7", title: "流注理论", desc: "流注自持条件 e^(αd)=常数 与汤逊条件对比" },
        ],
        questions: []
      },

      {
        id: "1-6", chapterId: 1,
        title: "汤逊理论",
        content: `<p>pd值较小时，自持放电条件可用汤逊理论说明（巴申定律即建立在此理论基础上）。</p>
    <p>pd值较大时，用流注理论解释（两个理论的适用条件互补）。</p>
    <p>对于空气来说，这一pd值的临界值为<strong>26kPa·cm</strong>。</p>
    <p><strong>γ过程：</strong>由于阴极材料的表面逸出功比气体分子的电离能小很多，因而正离子碰撞阴极较易使阴极释放出电子。此外正负离子复合时以及分子由激励态跃迁回正常态时所产生光子到达阴极表面，都将引起阴极表面电离，统称为γ过程。γ过程与α过程共同构成汤逊自持放电条件 γ(e^(αd)−1)=1。γ过程中"光子到达阴极表面引起电离"与光电离（光子引起气体分子电离）同为光致电离，但作用对象不同：γ过程光子作用于阴极金属表面，光电离光子作用于气体分子。</p>
    <p><strong>汤逊理论适用范围：</strong>在低气压、pd较小的条件下适用（pd过小或过大，汤逊理论不再适用）。流注理论弥补了汤逊理论在pd较大时不适用的情况。</p>
    <p><strong>巴申定律：</strong>击穿电压Ub与pd的关系曲线，即Ub = f(pd)。此定律由汤逊理论推导而来，描述均匀电场中击穿电压与气压和间隙距离乘积的关系。</p>`,

        content: `<p>在高气压、长气隙的情况下适用（与汤逊理论的低气压、pd小互补）。</p>
    <p>流注理论考虑了高气压、长气隙情况下不容忽视的若干因素，包括：电离出来的<strong>空间电荷会使电场畸变</strong>以及<strong>光子在放电过程中的作用</strong>。</p>

    <p>流注理论认为：初始阶段气体放电以碰撞电离和电子崩的形式出现，当电子崩发展到一定程度后，某一初始电子崩的头部积聚到足够数量的空间电荷，就会引起新的强烈电离和二次电子崩，这种强烈电离和二次电子崩是由于空间电荷使局部电场大大增强以及发生空间光电离的结果，这时放电即转入新的流注阶段。</p>
    <p><strong>流注特点：</strong>电离强度很大、传播速度很快（超过初崩发展速度10倍以上）；出现流注后，放电便获得独立继续发展的能力，不再依赖外界电离因子的作用，出现流注的条件也就是自持放电条件。</p>

            itemsHTML += '<div class="options">' + q.content.options.join('<br>') + '</div>';
          }
          itemsHTML += '<div class="answer-hint">提示：结合"' + kp.title + '"相关知识点作答</div></div>';
        }
        html += '<div class="question-block"><div class="question-type-label">&#x1F4DD; ' + label + '</div>' + itemsHTML + '</div>';
      }
      container.innerHTML = html;
    }

    // ===== 核心导航：navigateTo =====
    function navigateTo(chapterId, kpIndex, direction) {
      var chapterKPs = getChapterKPs(chapterId);

      // 检查章节边界
      if (kpIndex < 0) {
        showBoundaryModal(chapterId, 'prev');
        return;
      }
      if (kpIndex >= chapterKPs.length) {
        showBoundaryModal(chapterId, 'next');
        return;
      }

      // 添加滑动动画
      var card = document.getElementById('knowledge-card');
      var animClass = direction === 'left' ? 'swipe-left'
        : direction === 'right' ? 'swipe-right'
        : 'swipe-in';
      card.classList.add(animClass);

      var delay = direction === 'swipe-in' ? 0 : 150;
      setTimeout(function() {
        currentChapterId = chapterId;
        currentKpIndex = kpIndex;
        renderChapterTabs();
        renderKnowledgePoint();
        card.classList.remove(animClass);
      }, delay);
    }

    // ===== goNext =====
    function goNext() {
      var chapterKPs = getChapterKPs(currentChapterId);
      if (currentKpIndex + 1 < chapterKPs.length) {
        navigateTo(currentChapterId, currentKpIndex + 1, 'left');
      } else {
        showBoundaryModal(currentChapterId, 'next');
      }
    }

    // ===== goPrev =====
    function goPrev() {
      if (currentKpIndex - 1 >= 0) {
        navigateTo(currentChapterId, currentKpIndex - 1, 'right');
      } else {
        showBoundaryModal(currentChapterId, 'prev');
      }
    }

    // ===== jumpToKp =====
    function jumpToKp(targetId) {
      // 从全局数组中查找目标知识点
      var targetKp = null;
      for (var i = 0; i < KNOWLEDGE_POINTS.length; i++) {
        if (KNOWLEDGE_POINTS[i].id === targetId) {
          targetKp = KNOWLEDGE_POINTS[i];
          break;
        }
      }
      if (!targetKp) return;

      // 找到目标知识点在其章节内的索引
      var chapterKPs = getChapterKPs(targetKp.chapterId);
      var idx = -1;
      for (var j = 0; j < chapterKPs.length; j++) {
        if (chapterKPs[j].id === targetId) {
          idx = j;
          break;
        }
      }
      if (idx === -1) return;

      navigateTo(targetKp.chapterId, idx, 'swipe-in');
    }

    // ===== 章节边界弹窗 =====
    var modalCleanup = null;

    function showBoundaryModal(fromChapterId, direction) {
      // 找到当前章节在 CHAPTERS 中的索引
      var fromIdx = -1;
      for (var i = 0; i < CHAPTERS.length; i++) {
        if (CHAPTERS[i].id === fromChapterId) {
          fromIdx = i;
          break;
        }
      }
      if (fromIdx === -1) return;

      // 根据方向找目标章节
      var targetIdx = direction === 'next' ? fromIdx + 1 : fromIdx - 1;

      // 已是第一/最后一章时不弹窗
      if (targetIdx < 0 || targetIdx >= CHAPTERS.length) return;

      var targetChapter = CHAPTERS[targetIdx];
      var targetChapterKPs = getChapterKPs(targetChapter.id);

      // 清理之前的监听器
      if (modalCleanup) modalCleanup();

      var modal = document.getElementById('boundary-modal');
      var messageEl = document.getElementById('boundary-message');
      var yesBtn = document.getElementById('boundary-yes');
      var noBtn = document.getElementById('boundary-no');
      var overlay = modal.querySelector('.modal-overlay');

      messageEl.textContent = '是否进入' + targetChapter.title + '（' + targetChapter.subtitle + '）？';

      modal.classList.remove('modal-hidden');

      function onYes() {
        modal.classList.add('modal-hidden');
        var newIdx = direction === 'next' ? 0 : targetChapterKPs.length - 1;
        navigateTo(targetChapter.id, newIdx, direction === 'next' ? 'left' : 'right');
        cleanup();
      }

      function onNo() {
        modal.classList.add('modal-hidden');
        cleanup();
      }

      function onOverlay(e) {
        if (e.target === overlay) {
          modal.classList.add('modal-hidden');
          cleanup();
        }
      }

      function cleanup() {
        yesBtn.removeEventListener('click', onYes);
        noBtn.removeEventListener('click', onNo);
        overlay.removeEventListener('click', onOverlay);
        modalCleanup = null;
      }

      modalCleanup = cleanup;

      yesBtn.addEventListener('click', onYes);
      noBtn.addEventListener('click', onNo);
      overlay.addEventListener('click', onOverlay);
    }

    // ===== URL Hash 支持 =====
    function updateURL() {
      var chapterKPs = getChapterKPs(currentChapterId);
      var kp = chapterKPs[currentKpIndex];
      if (kp && kp.id) {
        location.hash = kp.id;
      }
    }

    function loadFromHash() {
      var hash = location.hash.replace('#', '');
      if (!hash) {
        currentChapterId = 1;
        currentKpIndex = 0;
        return;
      }

      for (var i = 0; i < KNOWLEDGE_POINTS.length; i++) {
        if (KNOWLEDGE_POINTS[i].id === hash) {
          var kp = KNOWLEDGE_POINTS[i];
          currentChapterId = kp.chapterId;
          var chapterKPs = getChapterKPs(kp.chapterId);
          for (var j = 0; j < chapterKPs.length; j++) {
            if (chapterKPs[j].id === hash) {
              currentKpIndex = j;
              return;
            }
          }
        }
      }

      currentChapterId = 1;
      currentKpIndex = 0;
    }

    window.addEventListener('hashchange', function() {
      loadFromHash();
      renderChapterTabs();
      renderKnowledgePoint();
    });

    // ===== 事件绑定 =====
    function bindEvents() {
      // 章节标签点击
      document.getElementById('chapter-tabs').addEventListener('click', function(e) {
        var tab = e.target.closest('.chapter-tab');
        if (!tab) return;
        var chapterId = parseInt(tab.getAttribute('data-chapter'), 10);
        if (chapterId === currentChapterId) return;
        navigateTo(chapterId, 0, 'swipe-in');
      });

      // 箭头按钮
      document.getElementById('btn-prev').addEventListener('click', goPrev);
      document.getElementById('btn-next').addEventListener('click', goNext);

      // 键盘导航
      document.addEventListener('keydown', function(e) {
        if (e.key === 'ArrowLeft') {
          e.preventDefault();
          goPrev();
        } else if (e.key === 'ArrowRight') {
          e.preventDefault();
          goNext();
        }
      });

      // 相关链接点击
      document.getElementById('related-links').addEventListener('click', function(e) {
        var link = e.target.closest('.related-link');
        if (!link) return;
        var targetId = link.getAttribute('data-target');
        if (targetId) jumpToKp(targetId);
      });

      // 触屏滑动
      var cardContainer = document.getElementById('card-container');
      var touchStartX = 0;
      var touchStartY = 0;

      cardContainer.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      }, { passive: true });

      cardContainer.addEventListener('touchend', function(e) {
        var deltaX = e.changedTouches[0].clientX - touchStartX;
        var deltaY = e.changedTouches[0].clientY - touchStartY;

        if (Math.abs(deltaX) > 50 && Math.abs(deltaX) > Math.abs(deltaY) * 1.5) {
          if (deltaX < 0) {
            goNext();
          } else {
            goPrev();
          }
        }
      }, { passive: true });
    }

    // ===== 初始化 =====
    function init() {
      loadFromHash();
      renderChapterTabs();
      renderKnowledgePoint();
      bindEvents();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
